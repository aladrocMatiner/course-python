[[route]]
id = "essential-foundations"
title = "Essential foundations"
duration = "14–21 sessions of 45–70 minutes"
outcome = "Build and explain a small local Python program using data, decisions, repetition, functions, iteration tools, and one class."
completion = "Complete Chapters 01–11, the Chapter 26 essential bridge, and Chapter 12."
stopping_point = "Stop safely after any checkpoint; optional previews are never required to continue."
entry_checkpoints = []
checkpoints = ["chapter-01", "chapter-02", "chapter-03", "chapter-04", "chapter-05", "chapter-06", "chapter-07", "chapter-08", "chapter-09", "chapter-10", "chapter-11", "chapter-26", "chapter-12"]

[[route]]
id = "practical-python"
title = "Practical Python"
duration = "6–10 sessions of 50–80 minutes"
outcome = "Organize, persist, test, and reproduce a local Python project."
completion = "Complete the checkpoints for Chapters 13–18."
stopping_point = "Chapter 18 is a complete practical stopping point before systems work."
entry_checkpoints = ["chapter-12"]
checkpoints = ["chapter-13", "chapter-14", "chapter-15", "chapter-16", "chapter-17", "chapter-18"]

[[route]]
id = "systems-python"
title = "Systems Python"
duration = "5–9 sessions plus the Chapter 23 multi-session lab"
outcome = "Build and diagnose bounded local HTTP, logging, asynchronous, introspection, and network programs."
completion = "Complete the checkpoints for Chapters 19–23."
stopping_point = "Stop at Chapter 22 for standard-library systems foundations or continue to the bounded Chapter 23 lab."
entry_checkpoints = ["chapter-18"]
checkpoints = ["chapter-19", "chapter-20", "chapter-21", "chapter-22", "chapter-23"]

[[route]]
id = "gradual-typing-bridge"
title = "Gradual typing bridge"
duration = "4–7 sessions of 50–75 minutes"
outcome = "Document and statically check typed Python boundaries without confusing annotations with runtime validation."
completion = "Complete the Chapter 27 essential and professional checkpoints; the checker lab is optional."
stopping_point = "Stop after the runtime route or continue with the explicitly provisioned checker snapshot."
entry_checkpoints = ["chapter-15", "chapter-18", "chapter-22", "chapter-26"]
checkpoints = ["chapter-27"]

[[route]]
id = "capstone-foundation"
title = "Professional capstone foundation"
duration = "2–3 sessions of 50–75 minutes"
outcome = "Build a tested in-memory service around immutable synthetic orders."
completion = "Complete the Chapter 28 foundation checkpoint."
stopping_point = "The in-memory artifact is complete; persistence, networking, and packaging remain optional."
entry_checkpoints = ["chapter-12"]
checkpoints = ["chapter-28-foundation"]

[[route]]
id = "capstone-practical"
title = "Professional capstone practical stage"
duration = "4–6 sessions of 50–80 minutes"
outcome = "Build and recover a transactional SQLite command-line application with privacy-safe logging."
completion = "Complete the Chapter 28 practical checkpoint after its foundation and Chapters 13–18 and 20."
stopping_point = "The practical application is complete; its loopback adapter and distribution build remain optional."
entry_checkpoints = ["chapter-17", "chapter-18", "chapter-20", "chapter-28-foundation"]
checkpoints = ["chapter-28-practical"]

[[route]]
