name: Book quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Run validator unit tests
        run: python -B -m unittest discover -s tools/tests -v
      - name: Validate multilingual review inventory
        run: python -B tools/parity_review.py
      - name: Validate changed book content
        if: github.event_name == 'pull_request'
        run: python -B tools/validate_book.py --changed-from "${{ github.event.pull_request.base.sha }}"
      - name: Validate complete book
        if: github.event_name == 'push'
        run: python -B tools/validate_book.py
      - name: Check pull-request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
      - name: Check pushed commit whitespace
        if: github.event_name == 'push'
        run: git diff-tree --check --no-commit-id -r HEAD
