name: Book quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Run changed-scope core evidence profile
        if: github.event_name == 'pull_request'
        run: python -B tools/run_quality.py --profile core --changed-from "${{ github.event.pull_request.base.sha }}" --format text
      - name: Run full core evidence profile
        if: github.event_name == 'push'
        run: python -B tools/run_quality.py --profile core --format text
      - name: Check pull-request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
      - name: Check pushed commit whitespace
        if: github.event_name == 'push'
        run: git diff-tree --check --no-commit-id -r HEAD

  network-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Run bounded loopback evidence profile
        run: python -B tools/run_quality.py --profile network-domain --format text

  learning-bridges:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Run bounded learning-bridges evidence profile
        run: python -B tools/run_quality.py --profile learning-bridges --format text

  cpp-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Run lightweight C++ contract evidence profile
        run: python -B tools/run_quality.py --profile cpp-domain --format text

  rust-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Run lightweight Rust contract evidence profile
        run: python -B tools/run_quality.py --profile rust-domain --format text
